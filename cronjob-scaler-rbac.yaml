apiVersion: v1
kind: ServiceAccount
metadata:
  name: cronjob-scaler
  namespace: online-boutique-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaler
  namespace: online-boutique-dev
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cronjob-scaler-binding
  namespace: online-boutique-dev
subjects:
- kind: ServiceAccount
  name: cronjob-scaler
  namespace: online-boutique-dev
roleRef:
  kind: Role
  name: scaler
  apiGroup: rbac.authorization.k8s.io
